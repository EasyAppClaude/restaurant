<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Каса">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" href="./icon-192.png">
<title>Каса — ресторан</title>
<link rel="stylesheet" href="./styles.css">
</head>
<body>

<main id="app"></main>

<nav class="bottom">
  <a href="#tables" data-route="tables" data-ico="table"><span class="ico"></span>Столики</a>
  <a href="#menu" data-route="menu" data-ico="menu"><span class="ico"></span>Меню</a>
  <a href="#history" data-route="history" data-ico="history"><span class="ico"></span>Історія</a>
  <a href="#settings" data-route="settings" data-ico="settings"><span class="ico"></span>Налаштування</a>
</nav>

<div id="modalBg" class="modal-bg"></div>
<div id="toast" class="toast"></div>

<script src="./icons.js"></script>
<script src="./app.js"></script>
<script>
  // подставляем иконки в нижнюю навигацию
  document.querySelectorAll('nav.bottom a[data-ico]').forEach(a => {
    a.querySelector('.ico').innerHTML = icon(a.dataset.ico, 22);
  });
</script>
</body>
</html>
